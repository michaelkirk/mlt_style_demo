<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>MLT Encoding Test</title>
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@5/dist/maplibre-gl.css" />
  <script src="https://unpkg.com/maplibre-gl@5/dist/maplibre-gl.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #1a1a1a; color: #eee; font-family: sans-serif; padding: 24px; }

    .map-block { margin-bottom: 48px; }

    .map-block h2 {
      font-size: 14px;
      font-weight: 600;
      font-family: monospace;
      margin-bottom: 4px;
    }

    .style-url {
      font-family: monospace;
      font-size: 12px;
      color: #aaa;
      margin-bottom: 12px;
      user-select: all;
    }

    .columns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .col-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #888;
      margin-bottom: 6px;
    }

    .map-container {
      width: 100%;
      height: 400px;
      border-radius: 6px;
      overflow: hidden;
    }

    .ios-errors {
      margin-top: 8px;
      padding: 10px 12px;
      background: #2a1a1a;
      border: 1px solid #5a2a2a;
      border-radius: 6px;
      font-family: monospace;
      font-size: 11px;
      color: #f88;
      white-space: pre-wrap;
    }

    .ios-screenshot {
      width: 100%;
      height: 400px;
      object-fit: contain;
      object-position: top;
      background: #111;
      border-radius: 6px;
      display: block;
    }
  </style>
</head>
<body>
  <script>
    const tileErrors = `tileDidTriggerAction: 4/2/5 .error, source: maplibre
tileDidTriggerAction: 6/10/22 .error, source: maplibre
tileDidTriggerAction: 3/1/2 .error, source: maplibre
tileDidTriggerAction: 6/10/22 .error, source: maplibre
tileDidTriggerAction: 2/0/1 .error, source: maplibre
tileDidTriggerAction: 6/10/22 .error, source: maplibre
tileDidTriggerAction: 1/0/0 .error, source: maplibre
tileDidTriggerAction: 5/5/11 .error, source: maplibre
tileDidTriggerAction: 0/0/0 .error, source: maplibre`;

    const styles = [
      { label: "no_style_encoding · no_tile_encoding", url: "styles/no_style_encoding_no_tile_encoding.json", iosErrors: tileErrors },
      { label: "no_style_encoding · mlt_tile_encoding", url: "styles/no_style_encoding_mlt_tile_encoding.json" },
      { label: "mlt_style_encoding · no_tile_encoding",  url: "styles/mlt_style_encoding_no_tile_encoding.json", iosErrors: tileErrors },
      { label: "mlt_style_encoding · mlt_tile_encoding", url: "styles/mlt_style_encoding_mlt_tile_encoding.json" },
    ];

    styles.forEach(({ label, url, iosErrors }, i) => {
      const slug = url.replace("styles/", "").replace(".json", "");
      const screenshotUrl = `images/ios-${slug}.png`;

      const block = document.createElement("div");
      block.className = "map-block";

      block.innerHTML = `
        <h2>${label}</h2>
        <div class="style-url">http://127.0.0.1:8000/${url}</div>
        <div class="columns">
          <div>
            <div class="col-label">Web</div>
            <div class="map-container" id="map-${i}"></div>
          </div>
          <div>
            <div class="col-label">Native (iOS)</div>
            <img class="ios-screenshot" src="${screenshotUrl}" alt="iOS screenshot for ${label}" />
            ${iosErrors ? `<pre class="ios-errors">${iosErrors}</pre>` : ""}
          </div>
        </div>
      `;

      document.body.appendChild(block);

      new maplibregl.Map({ container: `map-${i}`, style: url, attributionControl: true });
    });
  </script>
</body>
</html>
