<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>MLT Encoding Test</title>
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@5/dist/maplibre-gl.css" />
  <script src="https://unpkg.com/maplibre-gl@5/dist/maplibre-gl.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #1a1a1a; color: #eee; font-family: sans-serif; padding: 24px; }
    .map-block { margin-bottom: 40px; }
    .map-block h2 { font-size: 14px; font-weight: 600; margin-bottom: 8px; font-family: monospace; }
    .map-container { width: 100%; height: 400px; border-radius: 6px; overflow: hidden; }
  </style>
</head>
<body>
  <script>
    const styles = [
      { label: "no_style_encoding · no_tile_encoding", url: "styles/no_style_encoding_no_tile_encoding.json" },
      { label: "no_style_encoding · mlt_tile_encoding", url: "styles/no_style_encoding_mlt_tile_encoding.json" },
      { label: "mlt_style_encoding · no_tile_encoding",  url: "styles/mlt_style_encoding_no_tile_encoding.json" },
      { label: "mlt_style_encoding · mlt_tile_encoding", url: "styles/mlt_style_encoding_mlt_tile_encoding.json" },
    ];

    styles.forEach(({ label, url }, i) => {
      const block = document.createElement("div");
      block.className = "map-block";

      const h2 = document.createElement("h2");
      h2.textContent = label;

      const urlLine = document.createElement("div");
      urlLine.style.cssText = "font-family: monospace; font-size: 12px; color: #aaa; margin-bottom: 8px; user-select: all;";
      urlLine.textContent = `http://127.0.0.1:8000/${url}`;

      const container = document.createElement("div");
      container.className = "map-container";
      container.id = `map-${i}`;

      block.appendChild(h2);
      block.appendChild(urlLine);
      block.appendChild(container);
      document.body.appendChild(block);

      new maplibregl.Map({ container: container.id, style: url, attributionControl: true });
    });
  </script>
</body>
</html>
